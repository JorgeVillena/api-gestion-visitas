spring.application.name=api-gestion-visitas
server.servlet.context-path=/api
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/visitasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

security.jwt.secret=ZmFrZV9kZW1vX3NlY3JldF9rZXlfZm9yX2FwaV9nZXN0aW9uX3Zpc2l0YXMxMjM0NTY3ODkw
security.jwt.expiration-ms=3600000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.storage.evidencias-dir=./data/evidencias
app.gps.validation.threshold-meters=200

# CORS: coma-separado (ej. https://mi-app.vercel.app). * = cualquier origen (app móvil vía HTTP nativo + pruebas).
app.cors.allowed-origin-patterns=*
